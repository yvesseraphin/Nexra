{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'images/p7.png' %}" type="image/png">
    <title>Nexra - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/account-auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/global-notify.css' %}">
</head>
<body>

<!-- Login Page -->
<div class="login-page">
    <div class="login-left">
        <img src="{% static 'images/login-illustration.png' %}"
             alt="Nexra Shopping App"
             class="login-illustration">
    </div>
    <div class="login-right">
        <div class="login-container">
            <div class="login-logo">
                <a href="{% url 'home' %}" style="text-decoration: none;">
                    <h1>Nexra</h1>
                </a>
            </div>

            <!-- Login Form -->
            <form class="login-form" data-auth-mode="login">
                <p class="auth-feedback" id="auth-feedback" hidden aria-live="polite"></p>

                <!-- Email / Phone -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="far fa-envelope input-icon"></i>
                        <input
                            type="text"
                            name="identifier"
                            class="form-input"
                            placeholder="Email or Phone number"
                            autocomplete="username"
                            required>
                        <span class="input-status" data-email-status hidden aria-hidden="true">
                            <i class="fas fa-check"></i>
                        </span>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            name="password"
                            class="form-input"
                            placeholder="Password"
                            autocomplete="current-password"
                            required>
                    </div>
                </div>

                <!-- Forgot Password -->
                <div class="login-link" style="text-align:right; margin-bottom:20px;">
                    <a href="#">Forgot password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-signup">
                    <span data-submit-label>Log in</span>
                </button>

                <!-- Divider -->
                <div class="divider">
                    <span>Or</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="btn-social btn-facebook">
                        <i class="fab fa-facebook-f"></i>
                        Facebook
                    </button>

                    <button type="button" class="btn-social btn-google" style="display: flex; align-items: center; gap: 10px;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" 
                            alt="Google Logo" 
                            style="width: 18px; height: 18px;">
                        Google
                    </button>
                </div>

                <!-- Signup Link -->
                <div class="login-link">
                    Don't have an account?
                    <a href="{% url 'signup' %}">Sign up</a>
                </div>

            </form>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/global-notify.js' %}"></script>
<script src="{% static 'js/global-state.js' %}"></script>
<script src="{% static 'js/account-auth.js' %}"></script>
</body>
</html>
